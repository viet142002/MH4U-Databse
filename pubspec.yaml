name: mh4u_app
description: Monster Hunter 4 Ultimate Database App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Navigation
  go_router: ^14.2.0

  # Models / Serialization

  # Localization
  intl: ^0.20.2

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.11
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/mh4u.db
    - assets/images/

  generate: true
